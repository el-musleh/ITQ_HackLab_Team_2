# Gemini CLI Permission Policy
#
# Broad allow, minimal deny strategy
# Priority 999 = highest priority catch-all rules (allow everything by default)
# Priority 950 = deny-only rules (block destructive operations)
#
# The priority-999 run_shell_command rule with NO commandPrefix allows ALL commands.

# ==============================================================================
# BROAD ALLOW RULES (Priority 999)
# ==============================================================================

[[rule]]
decision = "allow"
priority = 999
toolName = "run_shell_command"

[[rule]]
decision = "allow"
priority = 999
toolName = "write_file"

[[rule]]
decision = "allow"
priority = 999
toolName = "replace"

[[rule]]
decision = "allow"
priority = 999
toolName = "read_file"

[[rule]]
decision = "allow"
priority = 999
toolName = "web_fetch"

[[rule]]
decision = "allow"
priority = 999
toolName = "google_web_search"

[[rule]]
decision = "allow"
priority = 999
toolName = "save_memory"

[[rule]]
decision = "allow"
priority = 999
toolName = "activate_skill"

[[rule]]
decision = "allow"
priority = 999
toolName = "enter_plan_mode"

# ==============================================================================
# DENY RULES (Priority 950)
# ==============================================================================

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "reboot" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "poweroff" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "shutdown" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "systemctl", "reboot" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "systemctl", "poweroff" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "systemctl", "shutdown" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "init", "0" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "init", "6" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "rm", "-rf" ]

[[rule]]
decision = "deny"
priority = 950
toolName = "run_shell_command"
commandPrefix = [ "git", "push" ]
